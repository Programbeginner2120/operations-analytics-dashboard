spring:
  messages:
    basename: exception
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/operations-analytics-dashboard}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  application:
    name: dashboard
  liquibase:
    change-log: classpath:db/liquibase.xml

# MyBatis Configuration
mybatis:
  mapper-locations:
    - classpath:db/mapper/generated/**/*.xml
    - classpath:db/mapper/custom/**/*.xml
  type-aliases-package: com.killeen.dashboard.db.model.generated
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24 hours in milliseconds

# Plaid API Configuration
plaid:
  client-id: ${PLAID_CLIENT_ID}
  secret: ${PLAID_SECRET}
  environment: ${PLAID_ENVIRONMENT:sandbox}
  token-encryption-key: ${PLAID_TOKEN_ENCRYPTION_KEY}
  token-encryption-salt: ${PLAID_TOKEN_ENCRYPTION_SALT}

logging:
  level:
    root: INFO
    com.killeen: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
