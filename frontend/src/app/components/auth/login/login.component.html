<div class="auth-card">
    <div class="auth-card-header">
        <h2 class="auth-card-title">{{ formTitle() }}</h2>
        <p class="auth-card-subtitle">{{ formSubtitle() }}</p>
    </div>
    <form class="auth-card-form" (submit)="$event.preventDefault(); handleLogin()">
        <app-input
            [label]="'Email'"
            [type]="'email'"
            [placeholder]="'Enter your email'"
            [required]="true"
            [autocomplete]="'email'"
            [(value)]="email"
        ></app-input>
        <app-input
            [label]="'Password'"
            [type]="'password'"
            [placeholder]="'Enter your password'"
            [required]="true"
            [autocomplete]="'current-password'"
            [(value)]="password"
        ></app-input>
        @if (errorMessage()) {
            <div class="auth-card-error">{{ errorMessage() }}</div>
        }
        <app-button
            [type]="'submit'"
            [fullWidth]="true"
            [loading]="isLoading()"
            [disabled]="isLoading()"
        >{{ submitLabel() }}</app-button>
    </form>
    <div class="auth-card-footer">
        <button class="auth-card-toggle" (click)="navigateToRegister.emit()">{{ registerNavigationLabel() }}</button>
        <button class="auth-card-toggle" (click)="navigateToForgotPassword.emit()">{{ forgotPasswordNavigationLabel() }}</button>
    </div>
</div>
