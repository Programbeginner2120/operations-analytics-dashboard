<div class="header">
    <div class="left-section">
        @if (!onLandingPage()) {
            <app-button class="back-button" [variant]="'secondary'" [size]="'small'" [iconBefore]="arrowLeft" (click)="navigateToLandingPage()"></app-button>
        }
        <lucide-icon class="header-icon" [img]="layoutGrid" [size]="20"></lucide-icon>
        <div class="header-info">
            <h4 class="header-title">Operations Dashboard</h4>
            @if (showDashboardSpecificContent()) {
                <div class="header-subtitle">{{ numCards() }} active panels - Real-time analytics</div>
            }
        </div>
    </div>
    <div class="right-section">
        @if (currentUser()) {
            <span class="user-display-name">{{ currentUser()?.displayName || currentUser()?.email }}</span>
        }
        <button class="theme-toggle-button" (click)="themeService.toggleTheme()">
            @if (theme() === 'light') {
                <lucide-icon class="theme-toggle-icon" [img]="sun" [size]="20"></lucide-icon>
            } @else {
                <lucide-icon class="theme-toggle-icon" [img]="moon" [size]="20"></lucide-icon>
            }
        </button>
        @if (showDashboardSpecificContent()) {
            <button class="add-panel-button"
                    [disabled]="!hasConnectedDataSources()"
                    [title]="hasConnectedDataSources() ? 'Add a new panel' : 'Connect a data source to add panels'"
                    (click)="dashboardService.addCard()">
                <lucide-icon [img]="plus" [size]="20"></lucide-icon>
                Add Panel
            </button>
        }
        <button class="logout-button" (click)="logout()" title="Log out">
            <lucide-icon [img]="logOut" [size]="18"></lucide-icon>
        </button>
    </div>
</div>
