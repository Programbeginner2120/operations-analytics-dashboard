<div class="dashboard-header">
    <div class="left-section">
        <lucide-icon class="dashboard-header-icon" [img]="layoutGrid" [size]="20"></lucide-icon>
        <div class="dashboard-header-info">
            <h4 class="dashboard-header-title">Operations Dashboard</h4>
            <div class="dashboard-header-subtitle">{{ numCards }} active panels - Real-time analytics</div>
        </div>
    </div>
    <div class="right-section">
        <button class="theme-toggle-button" (click)="themeService.toggleTheme()">
            @if (theme() === 'light') {
                <lucide-icon class="theme-toggle-icon" [img]="sun" [size]="20"></lucide-icon>
            } @else {
                <lucide-icon class="theme-toggle-icon" [img]="moon" [size]="20"></lucide-icon>
            }
        </button>
        <button class="add-panel-button" (click)="dashboardService.addCard()">
            <lucide-icon [img]="plus" [size]="20"></lucide-icon>
            Add Panel
        </button>
    </div>
</div>
